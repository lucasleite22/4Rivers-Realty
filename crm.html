<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>4Rivers Realty — CRM</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
<style>
  [x-cloak] { display: none !important; }
  :root {
    --navy: #174079;
    --cyan: #00aeef;
    --bg: #f0f7fc;
    --dark: #07162b;
  }
  body { background: var(--bg); font-family: 'Segoe UI', system-ui, sans-serif; color: var(--dark); }
  .kanban-col { min-height: 400px; }
  .drag-over { outline: 2px dashed var(--cyan); outline-offset: 2px; background: rgba(0,174,239,0.06); }
  .card-drag { opacity: 0.4; }
  scrollbar-width: thin;
  .timeline-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; margin-top: 4px; }
  .badge { display: inline-block; padding: 1px 8px; border-radius: 999px; font-size: 11px; font-weight: 600; }
  .modal-backdrop { background: rgba(7,22,43,0.55); backdrop-filter: blur(2px); }
  .pill { border-radius: 999px; font-size: 11px; font-weight: 700; padding: 2px 10px; letter-spacing: .03em; }
  .nav-btn { transition: background .15s; }
  .nav-btn.active { background: rgba(0,174,239,0.18); color: #00aeef; }
  .nav-btn:hover:not(.active) { background: rgba(255,255,255,0.08); }
  .stat-card { border-left: 4px solid var(--cyan); }
</style>
<script>
tailwind.config = {
  theme: {
    extend: {
      colors: {
        navy: '#174079',
        cyan: '#00aeef',
        dark: '#07162b',
        bg: '#f0f7fc',
      }
    }
  }
}
</script>
</head>
<body x-data="crmApp()" x-cloak>

<!-- SIDEBAR -->
<div class="flex h-screen overflow-hidden">
  <aside class="w-56 flex-shrink-0 flex flex-col" style="background:var(--dark);">
    <div class="px-5 py-5 border-b border-white/10">
      <div class="text-white font-black text-lg tracking-tight leading-tight">4Rivers<br><span style="color:var(--cyan)">Realty</span></div>
      <div class="text-white/40 text-xs mt-0.5">CRM Portal</div>
    </div>
    <nav class="flex flex-col gap-1 px-3 mt-4 flex-1">
      <button @click="view='dashboard'" :class="view==='dashboard'?'active':''" class="nav-btn text-white/80 text-sm text-left px-3 py-2 rounded-lg flex items-center gap-2">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
        Dashboard
      </button>
      <button @click="view='pipeline'" :class="view==='pipeline'?'active':''" class="nav-btn text-white/80 text-sm text-left px-3 py-2 rounded-lg flex items-center gap-2">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 17V7m0 10a2 2 0 01-2 2H5a2 2 0 01-2-2V7a2 2 0 012-2h2a2 2 0 012 2m0 10a2 2 0 002 2h2a2 2 0 002-2M9 7a2 2 0 012-2h2a2 2 0 012 2m0 10V7m0 10a2 2 0 002 2h2a2 2 0 002-2V7a2 2 0 00-2-2h-2a2 2 0 00-2 2"/></svg>
        Pipeline
      </button>
      <button @click="view='leads'" :class="view==='leads'?'active':''" class="nav-btn text-white/80 text-sm text-left px-3 py-2 rounded-lg flex items-center gap-2">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
        All Leads
      </button>
    </nav>
    <div class="px-3 pb-4">
      <button @click="openNewLead()" class="w-full text-sm font-bold py-2 rounded-lg text-white" style="background:var(--cyan);">+ New Lead</button>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="flex-1 overflow-auto">
    <!-- TOPBAR -->
    <header class="sticky top-0 z-20 flex items-center justify-between px-6 py-3 border-b border-navy/10 bg-bg/90 backdrop-blur">
      <h1 class="font-bold text-navy text-lg" x-text="viewTitle()"></h1>
      <div class="flex items-center gap-3">
        <span class="text-xs text-navy/50" x-text="today()"></span>
        <div class="w-8 h-8 rounded-full flex items-center justify-center font-bold text-white text-sm" style="background:var(--navy)">4R</div>
      </div>
    </header>

    <!-- DASHBOARD -->
    <div x-show="view==='dashboard'" class="p-6">
      <!-- Stats -->
      <div class="grid grid-cols-4 gap-4 mb-6">
        <div class="bg-white rounded-xl p-4 shadow-sm stat-card">
          <div class="text-2xl font-black text-navy" x-text="stats.active"></div>
          <div class="text-sm text-navy/60 mt-0.5">Active Leads</div>
        </div>
        <div class="bg-white rounded-xl p-4 shadow-sm stat-card">
          <div class="text-2xl font-black text-navy" x-text="stats.showings"></div>
          <div class="text-sm text-navy/60 mt-0.5">Showings Scheduled</div>
        </div>
        <div class="bg-white rounded-xl p-4 shadow-sm stat-card">
          <div class="text-2xl font-black text-navy" x-text="stats.offers"></div>
          <div class="text-sm text-navy/60 mt-0.5">Offers In Progress</div>
        </div>
        <div class="bg-white rounded-xl p-4 shadow-sm stat-card">
          <div class="text-2xl font-black text-navy" x-text="stats.closedMonth"></div>
          <div class="text-sm text-navy/60 mt-0.5">Closed This Month</div>
        </div>
      </div>

      <div class="grid grid-cols-2 gap-6">
        <!-- Overdue Follow-ups -->
        <div class="bg-white rounded-xl p-5 shadow-sm">
          <h2 class="font-bold text-navy mb-3 flex items-center gap-2">
            <svg class="w-4 h-4 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
            Overdue Follow-ups
          </h2>
          <template x-if="overdueLeads.length===0">
            <p class="text-sm text-navy/40">All follow-ups are up to date 🎉</p>
          </template>
          <template x-for="lead in overdueLeads" :key="lead.id">
            <div class="flex items-center justify-between py-2 border-b border-navy/5 last:border-0 cursor-pointer hover:bg-bg rounded px-1" @click="openLead(lead)">
              <div>
                <div class="font-semibold text-sm text-navy" x-text="lead.name"></div>
                <div class="text-xs text-navy/50" x-text="lead.property || 'No property noted'"></div>
              </div>
              <div class="text-right">
                <span class="pill text-red-600 bg-red-50" x-text="daysSince(lead.lastContact) + 'd ago'"></span>
              </div>
            </div>
          </template>
        </div>

        <!-- Upcoming Activities -->
        <div class="bg-white rounded-xl p-5 shadow-sm">
          <h2 class="font-bold text-navy mb-3 flex items-center gap-2">
            <svg class="w-4 h-4" style="color:var(--cyan)" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
            Next 3 Days
          </h2>
          <template x-if="upcomingActivities.length===0">
            <p class="text-sm text-navy/40">No activities scheduled in the next 3 days.</p>
          </template>
          <template x-for="act in upcomingActivities" :key="act.id">
            <div class="flex items-start gap-3 py-2 border-b border-navy/5 last:border-0">
              <div class="timeline-dot mt-1" :style="'background:'+actColor(act.type)"></div>
              <div class="flex-1 min-w-0">
                <div class="text-sm font-semibold text-navy" x-text="act.leadName"></div>
                <div class="text-xs text-navy/60" x-text="capitalize(act.type) + ' · ' + fmtDate(act.date)"></div>
                <div class="text-xs text-navy/50 truncate" x-text="act.note"></div>
              </div>
            </div>
          </template>
        </div>
      </div>
    </div>

    <!-- PIPELINE (KANBAN) -->
    <div x-show="view==='pipeline'" class="p-6 overflow-x-auto">
      <div class="flex gap-4 min-w-max">
        <template x-for="col in columns" :key="col.id">
          <div class="w-64 flex-shrink-0">
            <div class="flex items-center justify-between mb-2 px-1">
              <span class="font-bold text-xs uppercase tracking-wider text-navy/70" x-text="col.label"></span>
              <span class="pill text-navy/70 bg-navy/10" x-text="leadsInCol(col.id).length"></span>
            </div>
            <div class="kanban-col rounded-xl p-2 space-y-2"
              :id="'col-'+col.id"
              style="background:rgba(23,64,121,0.05);"
              @dragover.prevent="onDragOver($event, col.id)"
              @dragleave="onDragLeave($event)"
              @drop.prevent="onDrop($event, col.id)">
              <template x-for="lead in leadsInCol(col.id)" :key="lead.id">
                <div class="bg-white rounded-lg p-3 shadow-sm cursor-pointer hover:shadow-md transition-shadow border border-navy/5 select-none"
                  draggable="true"
                  @dragstart="onDragStart($event, lead.id)"
                  @dragend="onDragEnd($event)"
                  @click="openLead(lead)">
                  <div class="flex items-start justify-between mb-1">
                    <span class="font-bold text-sm text-navy leading-tight" x-text="lead.name"></span>
                    <span class="pill ml-1 flex-shrink-0" :class="typePill(lead.type)" x-text="lead.type"></span>
                  </div>
                  <div class="text-xs text-navy/60 mb-1" x-text="lead.phone"></div>
                  <div class="text-xs text-navy/50 truncate" x-text="lead.property || '—'"></div>
                  <div class="mt-2 pt-2 border-t border-navy/5 flex items-center justify-between">
                    <span class="text-xs text-navy/40">Last contact</span>
                    <span class="text-xs font-semibold" :class="daysSince(lead.lastContact)>7?'text-red-500':'text-navy/60'" x-text="daysSince(lead.lastContact)===0?'Today':daysSince(lead.lastContact)+'d ago'"></span>
                  </div>
                </div>
              </template>
              <template x-if="leadsInCol(col.id).length===0">
                <div class="text-center text-xs text-navy/30 py-6">Drop here</div>
              </template>
            </div>
          </div>
        </template>
      </div>
    </div>

    <!-- ALL LEADS TABLE -->
    <div x-show="view==='leads'" class="p-6">
      <div class="flex items-center gap-3 mb-4">
        <input type="text" x-model="search" placeholder="Search leads…" class="border border-navy/20 rounded-lg px-3 py-2 text-sm w-64 focus:outline-none focus:ring-2 focus:ring-cyan/40">
        <select x-model="filterType" class="border border-navy/20 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-cyan/40">
          <option value="">All Types</option>
          <option>Buyer</option><option>Seller</option><option>Investor</option>
        </select>
        <select x-model="filterStage" class="border border-navy/20 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-cyan/40">
          <option value="">All Stages</option>
          <template x-for="col in columns" :key="col.id"><option :value="col.id" x-text="col.label"></option></template>
        </select>
      </div>
      <div class="bg-white rounded-xl shadow-sm overflow-hidden">
        <table class="w-full text-sm">
          <thead>
            <tr class="border-b border-navy/10">
              <th class="text-left px-4 py-3 text-xs font-bold text-navy/50 uppercase tracking-wider">Name</th>
              <th class="text-left px-4 py-3 text-xs font-bold text-navy/50 uppercase tracking-wider">Type</th>
              <th class="text-left px-4 py-3 text-xs font-bold text-navy/50 uppercase tracking-wider">Stage</th>
              <th class="text-left px-4 py-3 text-xs font-bold text-navy/50 uppercase tracking-wider">Property Interest</th>
              <th class="text-left px-4 py-3 text-xs font-bold text-navy/50 uppercase tracking-wider">Budget</th>
              <th class="text-left px-4 py-3 text-xs font-bold text-navy/50 uppercase tracking-wider">Last Contact</th>
            </tr>
          </thead>
          <tbody>
            <template x-for="lead in filteredLeads" :key="lead.id">
              <tr class="border-b border-navy/5 hover:bg-bg cursor-pointer" @click="openLead(lead)">
                <td class="px-4 py-3">
                  <div class="font-semibold text-navy" x-text="lead.name"></div>
                  <div class="text-xs text-navy/40" x-text="lead.email"></div>
                </td>
                <td class="px-4 py-3"><span class="pill" :class="typePill(lead.type)" x-text="lead.type"></span></td>
                <td class="px-4 py-3"><span class="pill bg-navy/10 text-navy/70" x-text="colLabel(lead.stage)"></span></td>
                <td class="px-4 py-3 text-navy/70" x-text="lead.property || '—'"></td>
                <td class="px-4 py-3 text-navy/70" x-text="lead.budget?'$'+Number(lead.budget).toLocaleString():'—'"></td>
                <td class="px-4 py-3">
                  <span :class="daysSince(lead.lastContact)>7?'text-red-500 font-semibold':'text-navy/60'" x-text="daysSince(lead.lastContact)===0?'Today':daysSince(lead.lastContact)+'d ago'"></span>
                </td>
              </tr>
            </template>
          </tbody>
        </table>
      </div>
    </div>
  </main>
</div>

<!-- LEAD DETAIL MODAL -->
<div x-show="modalOpen" class="fixed inset-0 z-50 flex items-center justify-center p-4" @keydown.escape.window="closeModal()">
  <div class="modal-backdrop absolute inset-0" @click="closeModal()"></div>
  <div class="relative bg-white rounded-2xl shadow-2xl w-full max-w-2xl max-h-[90vh] overflow-hidden flex flex-col z-10">
    <!-- Modal Header -->
    <div class="flex items-start justify-between px-6 pt-5 pb-4 border-b border-navy/10" style="background:var(--navy);">
      <div>
        <h2 class="text-xl font-black text-white" x-text="modalLead?.name"></h2>
        <div class="flex items-center gap-2 mt-1">
          <span class="pill" :class="typePill(modalLead?.type)" x-text="modalLead?.type"></span>
          <span class="text-white/60 text-xs" x-text="modalLead?.email"></span>
          <span class="text-white/60 text-xs" x-text="modalLead?.phone"></span>
        </div>
      </div>
      <button @click="closeModal()" class="text-white/60 hover:text-white mt-1">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
      </button>
    </div>

    <div class="overflow-y-auto flex-1 px-6 py-4">
      <!-- Details grid -->
      <div class="grid grid-cols-3 gap-3 mb-5">
        <div class="bg-bg rounded-lg p-3">
          <div class="text-xs text-navy/50 mb-0.5">Stage</div>
          <select class="text-sm font-semibold text-navy bg-transparent w-full focus:outline-none" x-model="modalLead.stage">
            <template x-for="col in columns" :key="col.id"><option :value="col.id" x-text="col.label"></option></template>
          </select>
        </div>
        <div class="bg-bg rounded-lg p-3">
          <div class="text-xs text-navy/50 mb-0.5">Budget</div>
          <div class="text-sm font-semibold text-navy" x-text="modalLead?.budget?'$'+Number(modalLead.budget).toLocaleString():'N/A'"></div>
        </div>
        <div class="bg-bg rounded-lg p-3">
          <div class="text-xs text-navy/50 mb-0.5">Source</div>
          <div class="text-sm font-semibold text-navy" x-text="modalLead?.source || '—'"></div>
        </div>
        <div class="bg-bg rounded-lg p-3">
          <div class="text-xs text-navy/50 mb-0.5">Property Interest</div>
          <div class="text-sm font-semibold text-navy" x-text="modalLead?.property || '—'"></div>
        </div>
        <div class="bg-bg rounded-lg p-3">
          <div class="text-xs text-navy/50 mb-0.5">Acreage</div>
          <div class="text-sm font-semibold text-navy" x-text="modalLead?.acreage ? modalLead.acreage+' acres' : '—'"></div>
        </div>
        <div class="bg-bg rounded-lg p-3">
          <div class="text-xs text-navy/50 mb-0.5">County</div>
          <div class="text-sm font-semibold text-navy" x-text="modalLead?.county || '—'"></div>
        </div>
      </div>
      <template x-if="modalLead?.notes">
        <div class="bg-yellow-50 border border-yellow-200 rounded-lg p-3 mb-5 text-sm text-navy/70" x-text="modalLead.notes"></div>
      </template>

      <!-- Activity Timeline -->
      <h3 class="font-bold text-navy text-sm mb-3">Activity Timeline</h3>
      <div class="space-y-3 mb-5">
        <template x-if="sortedActivities.length===0">
          <p class="text-sm text-navy/40">No activities yet.</p>
        </template>
        <template x-for="act in sortedActivities" :key="act.id">
          <div class="flex gap-3 items-start">
            <div class="timeline-dot" :style="'background:'+actColor(act.type)"></div>
            <div class="flex-1 bg-bg rounded-lg p-3">
              <div class="flex items-center justify-between mb-0.5">
                <span class="text-xs font-bold uppercase tracking-wide" :style="'color:'+actColor(act.type)" x-text="act.type"></span>
                <span class="text-xs text-navy/40" x-text="fmtDate(act.date)"></span>
              </div>
              <div class="text-sm text-navy/70" x-text="act.note"></div>
            </div>
          </div>
        </template>
      </div>

      <!-- Add Activity -->
      <div class="border border-navy/15 rounded-xl p-4">
        <h4 class="font-bold text-navy text-sm mb-3">Log Activity</h4>
        <div class="grid grid-cols-2 gap-3 mb-3">
          <div>
            <label class="text-xs text-navy/50 block mb-1">Type</label>
            <select x-model="newAct.type" class="w-full border border-navy/20 rounded-lg px-3 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-cyan/40">
              <option>Call</option><option>Email</option><option>Showing</option><option>Offer</option><option>Note</option>
            </select>
          </div>
          <div>
            <label class="text-xs text-navy/50 block mb-1">Date</label>
            <input type="date" x-model="newAct.date" class="w-full border border-navy/20 rounded-lg px-3 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-cyan/40">
          </div>
        </div>
        <textarea x-model="newAct.note" placeholder="Notes…" rows="2" class="w-full border border-navy/20 rounded-lg px-3 py-2 text-sm resize-none focus:outline-none focus:ring-2 focus:ring-cyan/40 mb-3"></textarea>
        <button @click="addActivity()" class="px-4 py-2 rounded-lg text-white text-sm font-bold" style="background:var(--cyan);">Log Activity</button>
      </div>
    </div>
  </div>
</div>

<!-- NEW LEAD MODAL -->
<div x-show="newLeadOpen" class="fixed inset-0 z-50 flex items-center justify-center p-4">
  <div class="modal-backdrop absolute inset-0" @click="newLeadOpen=false"></div>
  <div class="relative bg-white rounded-2xl shadow-2xl w-full max-w-xl max-h-[90vh] overflow-y-auto z-10 p-6">
    <div class="flex items-center justify-between mb-4">
      <h2 class="text-xl font-black text-navy">New Lead</h2>
      <button @click="newLeadOpen=false" class="text-navy/40 hover:text-navy">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
      </button>
    </div>
    <div class="space-y-3">
      <div class="grid grid-cols-2 gap-3">
        <div>
          <label class="text-xs text-navy/50 block mb-1">Name *</label>
          <input x-model="newLead.name" type="text" class="w-full border border-navy/20 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-cyan/40" placeholder="Full name">
        </div>
        <div>
          <label class="text-xs text-navy/50 block mb-1">Phone</label>
          <input x-model="newLead.phone" type="tel" class="w-full border border-navy/20 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-cyan/40" placeholder="(352) 000-0000">
        </div>
      </div>
      <div>
        <label class="text-xs text-navy/50 block mb-1">Email</label>
        <input x-model="newLead.email" type="email" class="w-full border border-navy/20 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-cyan/40" placeholder="email@example.com">
      </div>
      <div class="grid grid-cols-2 gap-3">
        <div>
          <label class="text-xs text-navy/50 block mb-1">Type</label>
          <select x-model="newLead.type" class="w-full border border-navy/20 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-cyan/40">
            <option>Buyer</option><option>Seller</option><option>Investor</option>
          </select>
        </div>
        <div>
          <label class="text-xs text-navy/50 block mb-1">Source</label>
          <select x-model="newLead.source" class="w-full border border-navy/20 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-cyan/40">
            <option>Website</option><option>Referral</option><option>Zillow</option><option>Realtor.com</option><option>Instagram</option><option>Other</option>
          </select>
        </div>
      </div>
      <div>
        <label class="text-xs text-navy/50 block mb-1">Property Interest</label>
        <input x-model="newLead.property" type="text" class="w-full border border-navy/20 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-cyan/40" placeholder="e.g. Horse farm with arena, 20+ acres">
      </div>
      <div class="grid grid-cols-3 gap-3">
        <div>
          <label class="text-xs text-navy/50 block mb-1">Budget (USD)</label>
          <input x-model="newLead.budget" type="number" class="w-full border border-navy/20 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-cyan/40" placeholder="1500000">
        </div>
        <div>
          <label class="text-xs text-navy/50 block mb-1">Acreage</label>
          <input x-model="newLead.acreage" type="number" class="w-full border border-navy/20 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-cyan/40" placeholder="20">
        </div>
        <div>
          <label class="text-xs text-navy/50 block mb-1">County</label>
          <input x-model="newLead.county" type="text" class="w-full border border-navy/20 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-cyan/40" placeholder="Marion">
        </div>
      </div>
      <div>
        <label class="text-xs text-navy/50 block mb-1">Initial Stage</label>
        <select x-model="newLead.stage" class="w-full border border-navy/20 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-cyan/40">
          <template x-for="col in columns.filter(c=>!c.closed)" :key="col.id"><option :value="col.id" x-text="col.label"></option></template>
        </select>
      </div>
      <div>
        <label class="text-xs text-navy/50 block mb-1">Notes</label>
        <textarea x-model="newLead.notes" rows="3" class="w-full border border-navy/20 rounded-lg px-3 py-2 text-sm resize-none focus:outline-none focus:ring-2 focus:ring-cyan/40" placeholder="Additional notes…"></textarea>
      </div>
      <button @click="saveLead()" class="w-full py-2.5 rounded-lg text-white font-bold text-sm mt-1" style="background:var(--navy);">Save Lead</button>
    </div>
  </div>
</div>

<script>
function crmApp() {
  const TODAY = new Date();
  const todayStr = TODAY.toISOString().split('T')[0];

  function daysAgo(n) {
    const d = new Date(TODAY);
    d.setDate(d.getDate() - n);
    return d.toISOString().split('T')[0];
  }
  function daysFromNow(n) {
    const d = new Date(TODAY);
    d.setDate(d.getDate() + n);
    return d.toISOString().split('T')[0];
  }

  const sampleLeads = [
    {
      id: 1, name: 'Margaret "Maggie" Collins', email: 'maggie.collins@gmail.com', phone: '(352) 541-7823',
      type: 'Buyer', source: 'Referral', stage: 'showing',
      property: 'Horse farm w/ covered arena, 30+ acres', budget: 2200000, acreage: 30, county: 'Marion',
      lastContact: daysAgo(2),
      notes: 'Looking to relocate from Wellington FL. Has 6 horses, needs full equestrian setup.',
      activities: [
        { id: 101, type: 'Call', date: daysAgo(14), note: 'Initial inquiry from referral by Tom Harwood. Discussed budget and timeline.' },
        { id: 102, type: 'Email', date: daysAgo(10), note: 'Sent 4 property listings matching 30+ acre criteria in NW Marion County.' },
        { id: 103, type: 'Showing', date: daysAgo(2), note: 'Toured Windmill Ranch — loved the arena. Wants to bring husband next week.' },
      ]
    },
    {
      id: 2, name: 'Robert Ashford', email: 'rashford@ashfordcapital.com', phone: '(212) 448-9001',
      type: 'Investor', source: 'Website', stage: 'offer',
      property: 'Agricultural land 100+ acres, development potential', budget: 5000000, acreage: 100, county: 'Alachua',
      lastContact: daysAgo(1),
      notes: 'NYC-based private equity. Looking for land near Gainesville for agri-investment portfolio.',
      activities: [
        { id: 201, type: 'Call', date: daysAgo(20), note: 'Cold inbound from website. Qualified — serious buyer, cash close.' },
        { id: 202, type: 'Showing', date: daysAgo(12), note: 'Flew in for 2-property tour. Preferred Hawthorn Road parcel.' },

        { id: 204, type: 'Offer', date: daysAgo(1), note: 'Submitted $4.75M offer on Hawthorn Road 112-acre parcel. Seller countered at $4.9M.' },
      ]
    },
    {
      id: 3, name: 'Sandra & Jim Beaumont', email: 'sandyjim.beaumont@outlook.com', phone: '(813) 302-5544',
      type: 'Buyer', source: 'Zillow', stage: 'contacted',
      property: 'Small farm / hobby homestead, 10-20 acres', budget: 850000, acreage: 15, county: 'Marion',
      lastContact: daysAgo(9),
      notes: 'Retiring couple from Tampa. Chickens, goats, a few horses. Not in a rush but motivated.',
      activities: [
        { id: 301, type: 'Call', date: daysAgo(15), note: 'Reached out via Zillow. Scheduled intro call.' },
        { id: 302, type: 'Email', date: daysAgo(9), note: 'Sent welcome packet and 3 listings under $900K with 10+ acres.' },
      ]
    },
    {
      id: 4, name: 'Derek Fontaine', email: 'derek.fontaine@icloud.com', phone: '(352) 889-2217',
      type: 'Seller', source: 'Instagram', stage: 'new',
      property: 'Listing: 48-acre horse farm, Citra FL', budget: 1750000, acreage: 48, county: 'Marion',
      lastContact: daysAgo(0),
      notes: 'Inherited property from father. Wants to list ASAP. Needs staging consultation.',
      activities: [
        { id: 401, type: 'Call', date: todayStr, note: 'Initial call — confirmed ownership, probate is cleared. Scheduling listing appointment.' },
      ]
    },
    {
      id: 5, name: 'Priya Nair', email: 'priya.nair@veterinaryclinic.com', phone: '(352) 774-0033',
      type: 'Buyer', source: 'Referral', stage: 'contract',
      property: '10-15 acres with paddocks, close to Ocala', budget: 1100000, acreage: 12, county: 'Marion',
      lastContact: daysAgo(3),
      notes: 'Equine vet, wants to run a small rehab facility. Pre-approved for $1.1M.',
      activities: [
        { id: 501, type: 'Call', date: daysAgo(30), note: 'Referred by Dr. Marcus Webb. Immediate need — wants to close within 60 days.' },
        { id: 502, type: 'Showing', date: daysAgo(21), note: 'Toured Oak Run property — ideal layout. Minor fencing concerns.' },
        { id: 503, type: 'Offer', date: daysAgo(14), note: 'Submitted $1.05M. Accepted after minor negotiation at $1.075M.' },
        { id: 504, type: 'Note', date: daysAgo(3), note: 'Inspection completed. 1 HVAC issue flagged. Negotiating credit of $4,500.' },
      ]
    },
    {
      id: 6, name: 'Carlos Vega', email: 'cvega@vegafarmsllc.com', phone: '(352) 211-8800',
      type: 'Investor', source: 'Realtor.com', stage: 'new',
      property: 'Farm portfolio — looking for 3-5 properties', budget: 8000000, acreage: 50, county: 'Marion',
      lastContact: daysAgo(0),
      notes: 'Local agricultural investor. Already owns 2 farms. Expanding. Wants off-market deals.',
      activities: [
        { id: 601, type: 'Email', date: todayStr, note: 'Inbound Realtor.com inquiry. Responded with intro and availability for a call.' },
      ]
    },
    {
      id: 7, name: 'Beth Ann Tully', email: 'batully@gmail.com', phone: '(386) 504-1190',
      type: 'Buyer', source: 'Instagram', stage: 'lost',
      property: 'Equestrian estate, 50+ acres, gated', budget: 3500000, acreage: 55, county: 'Marion',
      lastContact: daysAgo(22),
      notes: 'Chose competing listing in Williston. Keep warm for future opportunities.',
      activities: [
        { id: 701, type: 'Call', date: daysAgo(40), note: 'Highly motivated buyer. Toured 3 properties.' },
        { id: 702, type: 'Offer', date: daysAgo(28), note: 'Submitted offer on Silverbell Estate — seller rejected.' },
        { id: 703, type: 'Note', date: daysAgo(22), note: 'Confirmed she went with another agent. Left door open for future search.' },
      ]
    },
    {
      id: 8, name: 'William & Caro Jennings', email: 'will.jennings@jenningsgroup.net', phone: '(404) 320-7845',
      type: 'Buyer', source: 'Website', stage: 'showing',
      property: 'Luxury equestrian estate 20-40 acres, must have guesthouse', budget: 4200000, acreage: 35, county: 'Marion',
      lastContact: daysAgo(5),
      notes: 'Atlanta executives. Semi-annual Ocala residents. Budget is firm. Architect reviewing properties.',
      activities: [
        { id: 801, type: 'Call', date: daysAgo(18), note: 'Inbound from website. Very specific criteria — architect involved in any purchase.' },
        { id: 802, type: 'Email', date: daysAgo(12), note: 'Sent curated packet of 5 properties with guesthouses.' },
        { id: 803, type: 'Showing', date: daysAgo(5), note: 'Full-day tour of 3 properties. Architect reviewed floor plans on-site. Top pick: Bridle Creek Estate.' },
      ]
    },
  ];

  const upcomingActivitiesData = [
    { id: 'ua1', leadName: 'Maggie Collins', type: 'Showing', date: daysFromNow(1), note: 'Return visit to Windmill Ranch with husband', leadId: 1 },
    { id: 'ua2', leadName: 'William & Caro Jennings', type: 'Call', date: daysFromNow(2), note: 'Architect review feedback call on Bridle Creek Estate', leadId: 8 },
    { id: 'ua3', leadName: 'Priya Nair', type: 'Note', date: daysFromNow(2), note: 'HVAC credit resolution deadline', leadId: 5 },
  ];

  return {
    view: 'dashboard',
    leads: sampleLeads,
    search: '',
    filterType: '',
    filterStage: '',
    modalOpen: false,
    modalLead: null,
    newLeadOpen: false,
    dragLeadId: null,
    newAct: { type: 'Call', date: todayStr, note: '' },
    newLead: { name:'', email:'', phone:'', type:'Buyer', source:'Website', stage:'new', property:'', budget:'', acreage:'', county:'', notes:'' },
    upcomingActivities: upcomingActivitiesData,
    columns: [
      { id: 'new', label: 'New Lead', closed: false },
      { id: 'contacted', label: 'Contacted', closed: false },
      { id: 'showing', label: 'Showing', closed: false },
      { id: 'offer', label: 'Offer Made', closed: false },
      { id: 'contract', label: 'Under Contract', closed: false },
      { id: 'won', label: 'Closed Won', closed: true },
      { id: 'lost', label: 'Closed Lost', closed: true },
    ],

    get stats() {
      const active = this.leads.filter(l => !['won','lost'].includes(l.stage)).length;
      const showings = this.leads.filter(l => l.stage==='showing').length;
      const offers = this.leads.filter(l => ['offer','contract'].includes(l.stage)).length;
      const thisMonth = this.leads.filter(l => l.stage==='won').length;
      return { active, showings, offers, closedMonth: thisMonth };
    },

    get overdueLeads() {
      return this.leads
        .filter(l => !['won','lost'].includes(l.stage) && this.daysSince(l.lastContact) > 7)
        .sort((a,b) => this.daysSince(b.lastContact) - this.daysSince(a.lastContact));
    },

    get filteredLeads() {
      return this.leads.filter(l => {
        const q = this.search.toLowerCase();
        const matchSearch = !q || l.name.toLowerCase().includes(q) || (l.property||'').toLowerCase().includes(q) || (l.email||'').toLowerCase().includes(q);
        const matchType = !this.filterType || l.type === this.filterType;
        const matchStage = !this.filterStage || l.stage === this.filterStage;
        return matchSearch && matchType && matchStage;
      });
    },

    get sortedActivities() {
      if (!this.modalLead) return [];
      return [...(this.modalLead.activities||[])].sort((a,b) => new Date(b.date) - new Date(a.date));
    },

    viewTitle() {
      const map = { dashboard:'Dashboard', pipeline:'Pipeline', leads:'All Leads' };
      return map[this.view] || '';
    },

    today() {
      return TODAY.toLocaleDateString('en-US', { weekday:'long', month:'long', day:'numeric', year:'numeric' });
    },

    daysSince(dateStr) {
      if (!dateStr) return 999;
      const diff = TODAY - new Date(dateStr);
      return Math.max(0, Math.floor(diff / 86400000));
    },

    fmtDate(dateStr) {
      if (!dateStr) return '—';
      return new Date(dateStr + 'T12:00:00').toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' });
    },

    capitalize(s) { return s ? s.charAt(0).toUpperCase() + s.slice(1) : ''; },

    colLabel(id) {
      const col = this.columns.find(c=>c.id===id);
      return col ? col.label : id;
    },

    leadsInCol(colId) {
      return this.leads.filter(l => l.stage === colId);
    },

    typePill(type) {
      const map = { Buyer: 'bg-emerald-100 text-emerald-700', Seller: 'bg-purple-100 text-purple-700', Investor: 'bg-amber-100 text-amber-700' };
      return map[type] || 'bg-gray-100 text-gray-600';
    },

    actColor(type) {
      const map = { Call:'#00aeef', Email:'#174079', Showing:'#f59e0b', Offer:'#10b981', Note:'#94a3b8' };
      return map[type] || '#94a3b8';
    },

    openLead(lead) {
      this.modalLead = lead;
      this.newAct = { type: 'Call', date: todayStr, note: '' };
      this.modalOpen = true;
    },

    closeModal() {
      this.modalOpen = false;
      this.modalLead = null;
    },

    openNewLead() {
      this.newLead = { name:'', email:'', phone:'', type:'Buyer', source:'Website', stage:'new', property:'', budget:'', acreage:'', county:'', notes:'' };
      this.newLeadOpen = true;
    },

    saveLead() {
      if (!this.newLead.name.trim()) { alert('Name is required.'); return; }
      const id = Date.now();
      this.leads.push({
        ...this.newLead,
        id,
        lastContact: todayStr,
        activities: [],
        budget: this.newLead.budget ? Number(this.newLead.budget) : null,
        acreage: this.newLead.acreage ? Number(this.newLead.acreage) : null,
      });
      this.newLeadOpen = false;
    },

    addActivity() {
      if (!this.newAct.note.trim()) { alert('Please add a note.'); return; }
      if (!this.modalLead.activities) this.modalLead.activities = [];
      this.modalLead.activities.push({ id: Date.now(), ...this.newAct });
      this.modalLead.lastContact = this.newAct.date;
      this.newAct = { type: 'Call', date: todayStr, note: '' };
    },

    // Drag & Drop
    onDragStart(evt, leadId) {
      this.dragLeadId = leadId;
      evt.target.classList.add('card-drag');
      evt.dataTransfer.effectAllowed = 'move';
    },

    onDragEnd(evt) {
      evt.target.classList.remove('card-drag');
      document.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
    },

    onDragOver(evt, colId) {
      document.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
      evt.currentTarget.classList.add('drag-over');
    },

    onDragLeave(evt) {
      if (!evt.currentTarget.contains(evt.relatedTarget)) {
        evt.currentTarget.classList.remove('drag-over');
      }
    },

    onDrop(evt, colId) {
      evt.currentTarget.classList.remove('drag-over');
      if (this.dragLeadId !== null) {
        const lead = this.leads.find(l => l.id === this.dragLeadId);
        if (lead) lead.stage = colId;
        this.dragLeadId = null;
      }
    },
  };
}
</script>
</body>
</html>
